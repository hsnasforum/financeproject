name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "file:./prisma/ci.db"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Prisma db push
        run: pnpm exec prisma db push

      - name: Verify (lint/schema/rules)
        run: pnpm validate:dumps:fixtures && pnpm data:doctor && pnpm dart:rules:gate && pnpm lint

      - name: Install Playwright Chromium (for planning:v2:complete)
        run: pnpm exec playwright install --with-deps chromium

      - name: Required Gate - Release Verify (test + complete + compat)
        run: pnpm release:verify

      - name: Planning V2 Static Guard
        run: pnpm planning:v2:guard

      - name: Planning V2 Regression Gate
        run: pnpm planning:v2:regress

      - name: Build
        run: pnpm build
